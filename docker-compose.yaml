services:

  # Laravel
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: backend
    working_dir: /var/www
    ports:
      - "8000:8000"
    command: >
      sh -c "chmod -R 775 storage bootstrap/cache &&
             php artisan serve --host=0.0.0.0 --port=8000"
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
    networks:
      - app-network

  # Vue
  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
    - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    command: sh -c "corepack enable && yarn install && yarn dev --host"
    networks:
      - app-network

  # MySQL
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network


volumes:
  mysql-data:

networks:
  app-network:
